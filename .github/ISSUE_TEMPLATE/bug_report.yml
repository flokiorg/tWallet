name: Bug Report
description: Report a problem with tWallet
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue! 🚀
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to recreate the bug.
      placeholder: |
        1. Run `twallet`
        2. Navigate to...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected-actual
    attributes:
      label: Expected vs Actual Behavior
      description: What did you expect vs what actually happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tWallet Version
      description: Run `twallet --version` to get this.
      placeholder: v0.x.x
    validations:
      required: true
  - type: dropdown
    id: network
    attributes:
      label: Network
      options:
        - Mainnet
        - Testnet
        - Regtest
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., Ubuntu 22.04, macOS Sonoma, Windows 11
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: |
        Please paste relevant logs from `twallet.log` or `flnd.log` here (see the README for default log locations).
      render: shell
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag and drop screenshots here if applicable.
  - type: checkboxes
    id: check-existing
    attributes:
      label: Self-Check
      options:
        - label: I have searched the existing issues for a duplicate.
          required: true
