name: Feature Request
description: A feature request for tWallet
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping make tWallet better! 🚀
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What is the current problem you are facing?
      placeholder: I currently have to...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed solution or feature.
      placeholder: It would be great if...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.
  - type: checkboxes
    id: check-existing
    attributes:
      label: Self-Check
      options:
        - label: I have searched the existing issues for a duplicate.
          required: true
